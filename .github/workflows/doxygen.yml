name: doxygen

on:
  push:
  pull_request:
    branches: [master]

env:
  DOXYGEN_TAG: Release_1_16_1
  DOXYGEN_VERSION: 1.16.1
  DOXYGEN_CACHE_DIR: ${{ github.workspace }}/.cache/doxygen-1.16.1

jobs:
  build:
    name: Build and deploy Doxygen documentation
    runs-on: ubuntu-latest

    steps:
      - name: Clone recursively
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies (gcc-14, gdb, graphviz, ghostscript, texlive)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 gdb graphviz ghostscript texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra

      - name: Restore Doxygen cache
        id: cache-doxygen
        uses: actions/cache@v4
        with:
          path: ${{ env.DOXYGEN_CACHE_DIR }}
          key: ${{ runner.os }}-doxygen-${{ env.DOXYGEN_VERSION }}

      - name: Install Doxygen
        if: steps.cache-doxygen.outputs.cache-hit != 'true'
        run: |
          archive="doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          url="https://github.com/doxygen/doxygen/releases/download/${DOXYGEN_TAG}/${archive}"

          mkdir -p "${{ github.workspace }}/.cache"
          rm -rf "${DOXYGEN_CACHE_DIR}"
          curl -L --fail --retry 5 --retry-all-errors --output "${RUNNER_TEMP}/${archive}" "${url}"
          tar -C "${{ github.workspace }}/.cache" -xf "${RUNNER_TEMP}/${archive}"

      - name: Configure
        run: |
          CC=gcc-14 CXX=g++-14 cmake -B ${{github.workspace}}/build \
            -DCMAKE_BUILD_TYPE=Debug                                \
            -DMIM_BUILD_DOCS=ON                                     \
            -DDOXYGEN_EXECUTABLE=${{ env.DOXYGEN_CACHE_DIR }}/bin/doxygen

      - name: Build
        run: cmake --build ${{github.workspace}}/build -v --target docs

      - name: Checkout docs repository
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
        uses: actions/checkout@v4
        with:
          repository: mimir/mimir.github.io
          ref: master
          path: site
          ssh-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Deploy
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
        run: python3 docs/deploy.py
