name: windows

on:
  push:
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build and test ${{matrix.build-type}} mode
    runs-on: windows-2022
    strategy:
      matrix:
        build-type: [Debug, Release]

    steps:
      - name: Clone recursively
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LIT
        shell: cmd
        run: python -m pip install lit psutil

      - name: Install FileCheck
        uses: i3h/download-release-asset@v1
        with:
          owner: fodinabor
          repo: FileCheckBuild
          tag: latest
          file: FileCheck-x86_64-win.exe
          path: ${{github.workspace}}/bin
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set CC=cl.exe
          set CXX=cl.exe
          python -c "import sys; print(sys.executable)" > tmpPath
          set /p PYTHON_EXE= < tmpPath
          cmake -B ${{github.workspace}}/build -G Ninja   ^
                -DCMAKE_BUILD_TYPE=${{matrix.build-type}} ^
                -DBUILD_TESTING=ON                        ^
                -DMIM_BUILD_EXAMPLES=ON                   ^
                -DPython3_EXECUTABLE=%PYTHON_EXE%         ^
                -DPython_EXECUTABLE=%PYTHON_EXE%          ^
                -DPYTHON_EXECUTABLE=%PYTHON_EXE%          ^
                -DMIM_LIT_TIMEOUT=300                     ^
                -DMIM_FILECHECK=${{github.workspace}}/bin/FileCheck-x86_64-win.exe

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build ${{github.workspace}}/build -v

      - name: Test
        working-directory: ${{github.workspace}}/build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PATH=${{github.workspace}}/bin;%PATH%
          cmake --build ${{github.workspace}}/build -v --target test-all
